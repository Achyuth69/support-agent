<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 650px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info h3 { font-size: 16px; font-weight: 600; }
    .header-info span { font-size: 12px; opacity: 0.85; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* Language selector */
    .lang-bar {
      background: #f8f9fa;
      padding: 8px 16px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }
    .lang-bar select {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      background: white;
      cursor: pointer;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg.bot .msg-avatar  { background: #667eea22; }
    .msg.user .msg-avatar { background: #764ba222; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot .msg-bubble {
      background: #f0f2f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
      text-align: right;
    }
    .msg.bot .msg-time { text-align: left; }

    /* Typing indicator */
    .typing {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px;
      background: #f0f2f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Quick replies */
    .quick-replies {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid #f0f2f5;
    }
    .quick-btn {
      background: white;
      border: 1px solid #667eea;
      color: #667eea;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-btn:hover { background: #667eea; color: white; }

    /* Input */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: white;
    }
    .input-area textarea {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 100px;
      font-family: inherit;
      line-height: 1.4;
      transition: border 0.2s;
    }
    .input-area textarea:focus { border-color: #667eea; }
    .send-btn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.08); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Ticket badge */
    .ticket-badge {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #2e7d32;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h3>Support Agent</h3>
      <span><span class="status-dot"></span>Online · Typically replies instantly</span>
    </div>
  </div>

  <!-- Language bar -->
  <div class="lang-bar">
    🌐 Language:
    <select id="langSelect">
      <option value="en">English</option>
      <option value="hi">हिंदी (Hindi)</option>
      <option value="ta">தமிழ் (Tamil)</option>
      <option value="te">తెలుగు (Telugu)</option>
      <option value="kn">ಕನ್ನಡ (Kannada)</option>
      <option value="mr">मराठी (Marathi)</option>
      <option value="bn">বাংলা (Bengali)</option>
      <option value="gu">ગુજરાતી (Gujarati)</option>
      <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
      <option value="ml">മലയാളം (Malayalam)</option>
    </select>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="msg-bubble">👋 Hello! I'm your support agent. I'm here to help you 24/7.

How can I assist you today?</div>
        <div class="msg-time">Just now</div>
      </div>
    </div>
  </div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="sendQuick('Track my order')">📦 Track Order</button>
    <button class="quick-btn" onclick="sendQuick('I want a refund')">💰 Refund</button>
    <button class="quick-btn" onclick="sendQuick('Reset my password')">🔑 Password</button>
    <button class="quick-btn" onclick="sendQuick('Cancel subscription')">❌ Cancel Plan</button>
    <button class="quick-btn" onclick="sendQuick('Speak to a human agent')">👤 Human Agent</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="msgInput" placeholder="Type your message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API_URL = window.location.origin + "/chat";
  const CUSTOMER_ID = "web_" + Math.random().toString(36).substr(2, 8);
  let isWaiting = false;

  // Keep-alive ping every 4 minutes to prevent Railway cold starts
  setInterval(() => fetch(window.location.origin + "/health").catch(() => {}), 240000);

  // Warm up the agent on page load silently
  fetch(window.location.origin + "/health").catch(() => {});

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  // ── Add message to UI ─────────────────────────────────────────────────────
  function addMessage(text, role) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const isTicket = text.includes('Ticket ID:');
    const bubbleExtra = isTicket
      ? `<div class="ticket-badge">🎫 ${text.match(/Ticket ID: (\w+)/)?.[1] || ''} — Ticket Created</div>`
      : '';

    div.innerHTML = `
      <div class="msg-avatar">${role === 'bot' ? '🤖' : '👤'}</div>
      <div>
        <div class="msg-bubble">${text.replace(/</g,'&lt;')}</div>
        ${bubbleExtra}
        <div class="msg-time">${getTime()}</div>
      </div>`;
    messages.appendChild(div);
    scrollBottom();
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    messages.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function callAPI(text, retries = 2) {
    for (let i = 0; i <= retries; i++) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customer_id: CUSTOMER_ID, message: text, channel: 'chat' })
        });
        const data = await res.json();
        if (res.ok && data.response) return data.response;
        if (i < retries) await new Promise(r => setTimeout(r, 2000));
      } catch (e) {
        if (i < retries) await new Promise(r => setTimeout(r, 2000));
      }
    }
    return null;
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isWaiting) return;

    const lang = document.getElementById('langSelect').value;

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    // Hide quick replies after first message
    document.getElementById('quickReplies').style.display = 'none';

    isWaiting = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const response = await callAPI(text);
      hideTyping();
      if (response) {
        addMessage(response, 'bot');
      } else {
        addMessage('Sorry, something went wrong. Please try again.', 'bot');
      }
    } catch (err) {
      hideTyping();
      addMessage('Unable to connect to support. Please check your connection.', 'bot');
    }

    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();
  }

  function sendQuick(text) {
    document.getElementById('msgInput').value = text;
    sendMessage();
  }
</script>

</body>
</html>
